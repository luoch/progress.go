<?xml version="1.0" encoding="UTF-8"?>
<svg width="{{ .TotalWidth }}" height="{{.TotalHeight}}" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid">
  <linearGradient id="a" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  {{ if .UseGradient }}
  <linearGradient id="{{ .GradientID }}" x1="0" x2="100%" y1="0" y2="0">
    <stop offset="0" stop-color="{{ .GradientStart }}"/>
    <stop offset="1" stop-color="{{ .GradientEnd }}"/>
  </linearGradient>
  {{ end }}

  {{ if .Title }}
  <rect rx="{{ .Radius }}" x="0" y="{{ .TitleY }}" width="{{ .TitleWidth }}" height="{{.TitleHeight}}" fill="#{{ .TitleColor }}"/>
  {{ end }}
  <rect rx="{{ .Radius }}" x="{{ .TitleWidth }}" y="{{ .ProgressY }}" width="{{ .ProgressWidth }}" height="{{.ProgressHeight}}" fill="{{ .TrackColor }}" />
  <rect rx="{{ .Radius }}" x="{{ .TitleWidth }}" y="{{ .ProgressY }}" width="{{ .BarWidth }}" height="{{.ProgressHeight}}" fill="{{ if .UseGradient }}url(#{{ .GradientID }}){{ else }}{{ .BarColor }}{{ end }}" />
  {{ if .Title }}
    <path fill="{{ if .UseGradient }}{{ .GradientStart }}{{ else }}{{ .BarColor }}{{ end }}" d="M{{ .TitleWidth }} {{ .ProgressY }}h4v{{.ProgressHeight}}h-4z" />
  {{ end }}
  {{ if ne .HighlightOpacity "0" }}
  {{ if .Title }}
  <rect rx="{{ .Radius }}" x="0" y="{{ .TitleY }}" width="{{ .TitleWidth }}" height="{{.TitleHeight}}" fill="url(#a)" opacity="{{ .HighlightOpacity }}" />
  {{ end }}
  <rect rx="{{ .Radius }}" x="{{ .TitleWidth }}" y="{{ .ProgressY }}" width="{{ .ProgressWidth }}" height="{{.ProgressHeight}}" fill="url(#a)" opacity="{{ .HighlightOpacity }}" />
  {{ end }}

  {{ if .Title }}
    <g fill="{{ .TextColor }}" text-anchor="start" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="{{.FontSize}}">
      {{ if ne .ShadowOpacity "0" }}
      <text x="{{ .TitleShadowX }}" y="{{ .TitleShadowY }}" fill="{{ .ShadowColor }}" fill-opacity="{{ .ShadowOpacity }}">
        {{ .Title }}
      </text>
      {{ end }}
      <text x="{{ .TitleTextX }}" y="{{ .TitleTextY }}">
        {{ .Title }}
      </text>
    </g>
  {{ end }}

  <g fill="{{ .TextColor }}" text-anchor="{{ .TextAnchor }}" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="{{.FontSize}}">
    {{ if ne .ShadowOpacity "0" }}
    <text x="{{ .TextShadowX }}" y="{{ .TextShadowY }}" fill="{{ .ShadowColor }}" fill-opacity="{{ .ShadowOpacity }}">
      {{.Prefix}}{{.Progress}}{{.Suffix}}
    </text>
    {{ end }}
    <text x="{{ .TextPosX }}" y="{{ .TextPosY }}">
      {{.Prefix}}{{.Progress}}{{.Suffix}}
    </text>
  </g>
</svg>
